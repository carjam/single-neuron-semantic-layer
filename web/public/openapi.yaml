openapi: 3.0.3
info:
  title: Semantic layer demo API
  description: |
    REST API for the toy UI.
    Primary model is hierarchy-driven enrichment:
    observations -> effective hierarchy -> wildcard rule matching -> matrix-constraint scores -> argmax -> enriched row.
  version: 1.1.0

servers:
  - url: /
    description: Current host (e.g. http://localhost:3000)

tags:
  - name: Health
    description: Runtime health checks for demo SQL routines.
  - name: HierarchyRules
    description: CRUD for hierarchy matching rules (rule_id + 3-level wildcard pattern + descriptor_01..10).
  - name: Rules
    description: Outcome/workstream reference data.
  - name: Enriched
    description: Computed enriched rows (JSON/CSV).

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Check demo SQL function availability
      operationId: healthCheck
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Missing required demo SQL routines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/hierarchy-rules:
    get:
      tags: [HierarchyRules]
      summary: List hierarchy rules
      operationId: listHierarchyRules
      responses:
        "200":
          description: Ordered by hierarchyRuleId asc
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HierarchyRuleListResponse"
    post:
      tags: [HierarchyRules]
      summary: Create hierarchy rule
      operationId: createHierarchyRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HierarchyRuleCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HierarchyRuleSingleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/RuleNotFound"

  /api/hierarchy-rules/{ruleId}:
    parameters:
      - $ref: "#/components/parameters/RuleId"
    get:
      tags: [HierarchyRules]
      summary: Get one hierarchy rule
      operationId: getHierarchyRule
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HierarchyRuleSingleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/HierarchyRuleNotFound"
    patch:
      tags: [HierarchyRules]
      summary: Update hierarchy rule fields
      operationId: patchHierarchyRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HierarchyRulePatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HierarchyRuleSingleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Rule or hierarchy rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
    delete:
      tags: [HierarchyRules]
      summary: Delete hierarchy rule
      operationId: deleteHierarchyRule
      responses:
        "204":
          description: Deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/HierarchyRuleNotFound"

  /api/rules:
    get:
      tags: [Rules]
      summary: List outcome rules
      operationId: listRules
      responses:
        "200":
          description: Ordered by ruleId asc
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesListResponse"

  /api/enriched:
    get:
      tags: [Enriched]
      summary: List enriched rows (JSON)
      operationId: listEnriched
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichedListResponse"

  /api/enriched/export:
    get:
      tags: [Enriched]
      summary: Download enriched rows as CSV
      operationId: exportEnrichedCsv
      responses:
        "200":
          description: CSV body
          content:
            text/csv:
              schema:
                type: string
                format: binary

components:
  parameters:
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Invalid input or JSON
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    RuleNotFound:
      description: Rule does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    HierarchyRuleNotFound:
      description: Hierarchy rule not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

  schemas:
    HealthResponse:
      type: object
      required: [ok, checks]
      properties:
        ok:
          type: boolean
        checks:
          type: object
          required: [demoGetEnrichedRows, demoGetDenseScores]
          properties:
            demoGetEnrichedRows:
              type: boolean
            demoGetDenseScores:
              type: boolean

    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RuleSummary:
      type: object
      required: [ruleId, decisionCode]
      properties:
        ruleId:
          type: integer
        decisionCode:
          type: string

    RulesListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RuleSummary"

    DescriptorValues:
      type: array
      minItems: 10
      maxItems: 10
      items:
        type: string
        nullable: true

    HierarchyRuleItem:
      type: object
      required:
        - hierarchyRuleId
        - ruleId
        - decisionCode
        - hierarchyTop
        - hierarchyMiddle
        - hierarchyBottom
        - descriptorValues
      properties:
        hierarchyRuleId:
          type: integer
        ruleId:
          type: integer
        decisionCode:
          type: string
        hierarchyTop:
          type: string
        hierarchyMiddle:
          type: string
        hierarchyBottom:
          type: string
        descriptorValues:
          $ref: "#/components/schemas/DescriptorValues"

    HierarchyRuleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyRuleItem"

    HierarchyRuleSingleResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: "#/components/schemas/HierarchyRuleItem"

    HierarchyRuleCreate:
      type: object
      required: [ruleId, hierarchyTop, hierarchyMiddle, hierarchyBottom, descriptorValues]
      properties:
        ruleId:
          type: integer
          minimum: 1
        hierarchyTop:
          type: string
        hierarchyMiddle:
          type: string
        hierarchyBottom:
          type: string
        descriptorValues:
          $ref: "#/components/schemas/DescriptorValues"

    HierarchyRulePatch:
      type: object
      properties:
        ruleId:
          type: integer
          minimum: 1
        hierarchyTop:
          type: string
        hierarchyMiddle:
          type: string
        hierarchyBottom:
          type: string
        descriptorValues:
          $ref: "#/components/schemas/DescriptorValues"

    EnrichedRow:
      type: object
      required:
        - observationId
        - isin
        - aldIssuerClass
        - aldRegion
        - aldRatingBand
        - effectiveIssuerClass
        - effectiveRegion
        - effectiveRatingBand
        - hierarchyTop
        - hierarchyMiddle
        - hierarchyBottom
        - matchedHierarchyRuleId
        - descriptorValues
        - activeFeatureIds
        - scoreByRuleId
        - scoreA
        - scoreB
        - scoreC
        - winningRuleId
        - winningDecisionCode
        - winningScore
      properties:
        observationId:
          type: integer
        isin:
          type: string
        aldIssuerClass:
          type: string
        fundIssuerClassOverride:
          type: string
          nullable: true
        aldRegion:
          type: string
        fundRegionOverride:
          type: string
          nullable: true
        aldRatingBand:
          type: string
        fundRatingBandOverride:
          type: string
          nullable: true
        effectiveIssuerClass:
          type: string
        effectiveRegion:
          type: string
        effectiveRatingBand:
          type: string
        hierarchyTop:
          type: string
        hierarchyMiddle:
          type: string
        hierarchyBottom:
          type: string
        matchedHierarchyRuleId:
          type: integer
          nullable: true
        descriptorValues:
          $ref: "#/components/schemas/DescriptorValues"
        activeFeatureIds:
          type: array
          items:
            type: integer
        scoreByRuleId:
          type: object
          additionalProperties:
            type: number
        scoreA:
          type: number
        scoreB:
          type: number
        scoreC:
          type: number
        winningRuleId:
          type: integer
        winningDecisionCode:
          type: string
        winningScore:
          type: number

    EnrichedListResponse:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/EnrichedRow"
